<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프랑스 탐험</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Poppins:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            /* 예술과 낭만의 느낌을 살린 연한 보라빛 배경색 */
            background-color: #f5f3ff; 
        }
        .font-en { font-family: 'Poppins', sans-serif; }
        
        /* 통통 튀는 애니메이션 효과 */
        @keyframes bounce-in {
            0% { transform: scale(0.8); opacity: 0; }
            60% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-bounce-in {
            animation: bounce-in 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 text-slate-800">

    <!-- 모바일 화면 크기에 맞춘 컨테이너 -->
    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden animate-bounce-in mt-4 border-4 border-indigo-200 relative">
        
        <!-- 상단 장식 (프랑스와 예술을 상징하는 인디고-퍼플 테마) -->
        <div class="absolute top-0 left-0 w-full h-3 bg-gradient-to-r from-indigo-500 to-purple-500"></div>

        <div class="p-6 text-center">
            <h1 class="text-sm font-bold text-indigo-500 mb-2 tracking-widest">MISSION UNLOCKED!</h1>
            
            <!-- 국기 이미지 -->
            <div class="w-full h-40 rounded-xl overflow-hidden shadow-md mb-4 border border-slate-100 flex items-center justify-center bg-slate-50">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Flag_of_France.svg" alt="프랑스 국기" class="w-full h-full object-cover">
            </div>

            <h2 class="text-4xl font-black text-slate-800 mb-1">프랑스</h2>
            <h3 class="text-xl font-en font-bold text-slate-400 mb-4">France</h3>

            <!-- 대륙 태그 -->
            <div class="inline-block bg-indigo-100 text-indigo-700 font-bold px-4 py-1.5 rounded-full text-sm mb-6 flex items-center justify-center gap-2 mx-auto w-fit">
                🌍 유럽 대륙 (Europe)
            </div>

            <!-- 초등학생 눈높이 설명 -->
            <div class="bg-indigo-50 rounded-2xl p-4 text-left mb-6 shadow-inner">
                <p class="text-slate-700 leading-relaxed font-medium mb-3">
                    프랑스 파리에 있는 세계 최대의 미술관인 <strong class="text-indigo-600">루브르 박물관</strong>에는 세상에서 가장 유명한 그림이 있어요. 
                    바로 천재 예술가 레오나르도 다 빈치가 그린 <strong class="text-indigo-600">'모나리자'</strong>랍니다!
                </p>
                
                <!-- 수학 탐정 미션 (황금비) -->
                <div class="bg-white rounded-xl p-4 border border-indigo-200 mt-4 relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1 h-full bg-indigo-400"></div>
                    <h4 class="text-sm font-black text-indigo-600 mb-2 flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        수학 탐정 미션: 모나리자의 비밀
                    </h4>
                    <p class="text-sm text-slate-600 leading-relaxed">
                        모나리자의 얼굴과 몸을 감싸는 사각형을 그려보면 놀랍게도 가장 아름다운 비율이라는 <strong>'황금비(1:1.618)'</strong>가 나타나요! 다 빈치는 그림을 그릴 때도 수학을 사용해서 사람들이 그림을 가장 편안하고 예쁘게 느끼도록 만들었답니다. 정말 천재 같죠?
                    </p>
                </div>
            </div>

            <!-- 모나리자 사진 -->
            <div class="w-full rounded-2xl overflow-hidden shadow-md border border-slate-200 mb-6 bg-slate-100 group relative">
                <!-- 위키미디어 공용의 모나리자 고화질 사진 -->
                <img 
                    src="https://upload.wikimedia.org/wikipedia/commons/e/ec/Mona_Lisa%2C_by_Leonardo_da_Vinci%2C_from_C2RMF_retouched.jpg" 
                    alt="모나리자" 
                    class="w-full h-auto object-cover group-hover:scale-105 transition-transform duration-500"
                    onerror="this.src='https://placehold.co/600x800/e2e8f0/475569?text=모나리자+사진'">
            </div>

        
        </div>
    </div>

    <!-- 하단 버튼 -->
    <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="mt-6 text-slate-400 font-bold text-sm flex items-center gap-1 hover:text-slate-600 transition-colors">
        ▲ 위로 가기
    </button>

</body>
</html>
